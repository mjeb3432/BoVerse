# Fly.io config for the BoVerse landing + /build app.
# Deploy:
#   cd landing
#   fly launch --no-deploy --copy-config --name boverse-landing
#   fly secrets set GOOGLE_GENERATIVE_AI_API_KEY=... DATABASE_URL=... DOCX_SERVICE_URL=...
#   fly deploy
#
# Custom domain (optional):
#   fly certs add boverse.ai
#   then point DNS A/AAAA records per Fly's instructions.

app = "boverse-landing"
primary_region = "iad"  # change to a region closer to you if you'd prefer

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"   # save money: scale to zero when idle
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
